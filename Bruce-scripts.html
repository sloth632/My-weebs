<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruce Scripts Heaven</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.11.0/jszip.min.js"></script>
<style>
body {
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f1115;
  color:white;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}
header{
  background:#1b1f2b;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  transition:0.2s;
}
header:hover{opacity:0.9;}
.header-logo{
  height:28px;
  width:28px;
  border-radius:5px;
}
#search{
  width:100%;
  padding:10px;
  border:none;
  outline:none;
  border-radius:8px;
  background:#1c222b;
  color:white;
  margin-bottom:10px;
}
.container{
  padding:10px;
  max-width:900px;
  margin:auto;
  flex:1;
}
.topbar{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
button{
  background:#2563eb;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{opacity:0.9;}
.file{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
  background:#161b22;
  margin-bottom:5px;
}
.file:hover{background:#1c222b;}
.file-left{display:flex;align-items:center;gap:10px;}
.icon{
  font-size:20px;
  width:30px;
  text-align:center;
}
.name{flex:1;word-break:break-word;}
.checkbox{width:18px;height:18px;}
.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  padding:10px;
  z-index:999;
}
.modal-content{
  background:#161b22;
  max-width:90%;
  max-height:90%;
  overflow:auto;
  padding:15px;
  border-radius:10px;
  position:relative;
}
.modal pre{
  white-space:pre-wrap;
  word-break:break-word;
}
.modal button.close{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  padding:5px 8px;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
footer{
  text-align:center;
  padding:10px;
  background:#1b1f2b;
  font-size:14px;
  position:sticky;
  bottom:0;
}
footer a{
  color:#2563eb;
  text-decoration:none;
}
footer a:hover{opacity:0.8;}
@media (min-width:700px){
  .file{padding:14px;}
  .name{font-size:16px;}
}
</style>
</head>
<body>

<header onclick="goHome()">
  <img src="https://avatars.githubusercontent.com/u/146448140?v=4" class="header-logo" alt="logo"> Bruce Scripts Heaven
</header>

<div class="container">
<div class="topbar">
<button onclick="goBack()">⬅ Back</button>
<button onclick="downloadSelected()">💾 Download Selected</button>
<input id="search" placeholder="Search files..." oninput="filterFiles()">
</div>
<div id="files"></div>
</div>

<footer>
Made by <a href="https://discord.com/users/the.sin.of.sloth" target="_blank">SLOTH</a>
</footer>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">✖</button>
    <pre id="modal-text"></pre>
    <a id="modal-download" href="" download>💾 Download File</a>
  </div>
</div>

<script>
const owner="sloth632";
const repo="Bruce-Scripts-Heaven";
let path="";
let currentFiles=[];
let selectedFiles=new Set();

async function loadFiles(folder=""){
  path=folder;
  selectedFiles.clear();
  const url=`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`;
  const res=await fetch(url);
  const data=await res.json();
  currentFiles=data;
  renderFiles(data);
}

function renderFiles(files){
  const container=document.getElementById("files");
  container.innerHTML="";
  files.forEach(file=>{
    const icon=file.type==="dir"?"📁":"📄";
    const div=document.createElement("div");
    div.className="file";
    div.innerHTML=`
      <div class="file-left">
        <input type="checkbox" class="checkbox" onchange="toggleSelect(this,'${file.path}')">
        <div class="icon">${icon}</div>
        <div class="name">${file.name}</div>
      </div>
    `;
    div.onclick=(e)=>{
      if(e.target.tagName==="INPUT") return;
      if(file.type==="dir"){
        loadFiles(file.path);
      } else {
        viewFile(file);
      }
    }
    container.appendChild(div);
  });
}

function toggleSelect(cb,path){
  if(cb.checked) selectedFiles.add(path);
  else selectedFiles.delete(path);
}

function goBack(){
  if(!path) return;
  const parts=path.split("/");
  parts.pop();
  loadFiles(parts.join("/"));
}

function goHome(){loadFiles("");}

function filterFiles(){
  const q=document.getElementById("search").value.toLowerCase();
  const filtered=currentFiles.filter(f=>f.name.toLowerCase().includes(q));
  renderFiles(filtered);
}

async function viewFile(file){
  const modal=document.getElementById("modal");
  const modalText=document.getElementById("modal-text");
  const modalDownload=document.getElementById("modal-download");
  modal.style.display="flex";
  modalDownload.href=file.download_url;
  modalDownload.download=file.name;
  const textExts=["txt","sub","ir","nfc","rfid","json","js","html","css","csv"];
  const ext=file.name.split(".").pop().toLowerCase();
  if(textExts.includes(ext)){
    const res=await fetch(file.download_url);
    const content=await res.text();
    modalText.textContent=content;
  } else {
    modalText.textContent="Preview not available.\nUse Download button.";
  }
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("modal-text").textContent="";
}

async function downloadSelected(){
  if(selectedFiles.size===0){alert("Select files/folders first"); return;}
  const zip = new JSZip();
  for(const p of selectedFiles) await addToZip(p,zip);
  zip.generateAsync({type:"blob"}).then(content=>{
    const a=document.createElement("a");
    a.href = URL.createObjectURL(content);
    a.download = "BruceScriptsHeaven.zip";
    a.click();
  });
}

async function addToZip(path, zip){
  const url=`https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
  const res=await fetch(url);
  const data=await res.json();
  if(Array.isArray(data)){
    const folder=zip.folder(path);
    for(const f of data) await addToZip(f.path, folder);
  } else {
    const fileData=await fetch(data.download_url).then(r=>r.blob());
    zip.file(path.split("/").pop(), fileData);
  }
}

loadFiles();
</script>

</body>
</html>
