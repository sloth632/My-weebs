<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruce Scripts Heaven</title>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial,sans-serif;
background:#0f1115;
color:white;
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
}

header{
background:#1b1f2b;
padding:14px;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.header-logo{
height:30px;
width:30px;
border-radius:6px;
}

.container{
flex:1;
overflow-y:auto;
padding:12px;
max-width:900px;
width:100%;
margin:auto;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:8px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

#search{
flex:1;
min-width:150px;
padding:10px;
border-radius:8px;
border:none;
background:#1c222b;
color:white;
}

.path{
background:#161b22;
padding:8px 12px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

.file{
display:flex;
align-items:center;
background:#161b22;
padding:12px;
border-radius:10px;
margin-bottom:6px;
cursor:pointer;
}

.file:hover{
background:#1c222b;
}

.file-left{
display:flex;
align-items:center;
gap:10px;
}

.icon{
width:26px;
font-size:18px;
}

footer{
background:#1b1f2b;
text-align:center;
padding:8px;
font-size:14px;
}

footer a{
color:#2563eb;
text-decoration:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:#161b22;
padding:20px;
border-radius:10px;
max-width:90%;
max-height:90%;
overflow:auto;
position:relative;
}

.modal pre{
white-space:pre-wrap;
word-break:break-word;
}

.close{
position:absolute;
top:10px;
right:10px;
background:red;
border:none;
color:white;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header onclick="goHome()">
<img src="https://avatars.githubusercontent.com/u/146448140?v=4" class="header-logo">
Bruce Scripts Heaven
</header>

<div class="container">

<div class="topbar">

<button onclick="goBack()">Back</button>

<button onclick="downloadSelected()">Download Selected Folder</button>

<button onclick="openRepo()">Open Repo</button>

<button onclick="downloadAll()">Download All</button>

<input id="search" placeholder="Search files..." oninput="filterFiles()">

</div>

<div class="path" id="pathDisplay">Directory: /</div>

<div id="files"></div>

</div>

<footer>
Made by <a href="https://discord.com/users/the.sin.of.sloth" target="_blank">SLOTH</a>
</footer>

<div class="modal" id="modal">
<div class="modal-content">
<button class="close" onclick="closeModal()">X</button>
<pre id="modal-text"></pre>
<button onclick="downloadCurrent()">Download File</button>
</div>
</div>

<script>

const owner="sloth632"
const repo="Bruce-Scripts-Heaven"
const branch="Main"

let path=""
let currentFiles=[]
let selectedFolder=null
let currentFile=null

async function loadFiles(folder=""){

path=folder

document.getElementById("pathDisplay").textContent="Directory: /"+folder

const url=`https://api.github.com/repos/${owner}/${repo}/contents/${folder}?ref=${branch}`

const res=await fetch(url)

const data=await res.json()

currentFiles=data

renderFiles(data)

}

function renderFiles(files){

const container=document.getElementById("files")

container.innerHTML=""

files.forEach(file=>{

const icon=file.type==="dir"?"📁":"📄"

const div=document.createElement("div")

div.className="file"

div.innerHTML=`
<div class="file-left">
<input type="radio" name="select">
<div class="icon">${icon}</div>
<div>${file.name}</div>
</div>
`

const radio=div.querySelector("input")

radio.onclick=(e)=>{
e.stopPropagation()

if(file.type==="dir"){
selectedFolder=file
}else{
selectedFolder=null
}

}

div.onclick=()=>{
if(file.type==="dir"){
loadFiles(file.path)
}else{
viewFile(file)
}
}

container.appendChild(div)

})

}

function goBack(){

if(!path){
loadFiles("")
return
}

const parts=path.split("/")

parts.pop()

loadFiles(parts.join("/"))

}

function goHome(){
loadFiles("")
}

function filterFiles(){

const q=document.getElementById("search").value.toLowerCase()

const filtered=currentFiles.filter(f=>f.name.toLowerCase().includes(q))

renderFiles(filtered)

}

function downloadSelected(){

if(!selectedFolder){
alert("Select a folder first")
return
}

window.open(
"https://download-directory.github.io/?url=https://github.com/"+owner+"/"+repo+"/tree/"+branch+"/"+selectedFolder.path
)

}

function openRepo(){

window.open("https://github.com/"+owner+"/"+repo)

}

function downloadAll(){

window.open("https://github.com/sloth632/Bruce-Scripts-Heaven/archive/refs/heads/Main.zip")

}

async function viewFile(file){

currentFile=file

const modal=document.getElementById("modal")

const text=document.getElementById("modal-text")

modal.style.display="flex"

const ext=file.name.split(".").pop().toLowerCase()

const textTypes=[
"txt","json","js","html","css","csv","md",
"sub","srt","vtt","xml",
"ir","nfc","rfid","ibtn"
]

const imageTypes=[
"png","jpg","jpeg","gif","webp"
]

if(textTypes.includes(ext)){

const res=await fetch(file.download_url)

const content=await res.text()

text.textContent=content

}

else if(imageTypes.includes(ext)){

text.innerHTML=`<img src="${file.download_url}" style="max-width:100%">`

}

else{

text.textContent="Preview not supported. Use download."

}

}

async function downloadCurrent(){

if(!currentFile)return

const res=await fetch(currentFile.download_url)

const blob=await res.blob()

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download=currentFile.name
a.click()

}

function closeModal(){

document.getElementById("modal").style.display="none"

document.getElementById("modal-text").textContent=""

}

loadFiles()

</script>

</body>
</html>
