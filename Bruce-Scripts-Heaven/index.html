<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=https://sloth-bruce-scripts.pages.dev/">
    <title>Moving to a New Home</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #00d4ff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .loader-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            animation: load 3s linear forwards;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }

        .redirect-text {
            font-size: 0.8rem;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>New Domain Alert</h1>
        <p>We've moved to a faster, better home. You’ll be there in just a moment.</p>
        
        <div class="loader-bar">
            <div class="progress"></div>
        </div>
        
        <div class="redirect-text">Redirecting...</div>
    </div>

</body>
</html>
